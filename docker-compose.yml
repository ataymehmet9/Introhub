version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: intro-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-introhub}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intro-hub-network

  # Redis (for BullMQ job queue)
  redis:
    image: redis:7-alpine
    container_name: intro-hub-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intro-hub-network

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intro-hub-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      # Node Environment
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-introhub}

      # Redis
      REDIS_URL: redis://redis:6379

      # Better Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      VITE_BETTER_AUTH_URL: ${VITE_BETTER_AUTH_URL}

      # OAuth Providers
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Email Service
      RESEND_API_KEY: ${RESEND_API_KEY}

      # File Upload (Better Upload - AWS S3)
      BETTER_UPLOAD_ACCESS_KEY: ${BETTER_UPLOAD_ACCESS_KEY}
      BETTER_UPLOAD_SECRET_KEY: ${BETTER_UPLOAD_SECRET_KEY}
      VITE_BETTER_UPLOAD_BUCKET_NAME: ${VITE_BETTER_UPLOAD_BUCKET_NAME}
      VITE_BETTER_UPLOAD_BUCKET_REGION: ${VITE_BETTER_UPLOAD_BUCKET_REGION}

      # Monitoring (Sentry)
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
      VITE_SENTRY_ORG: ${VITE_SENTRY_ORG}
      VITE_SENTRY_PROJECT: ${VITE_SENTRY_PROJECT}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}

      # Analytics (PostHog)
      VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY}
      VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST}
      VITE_PUBLIC_POSTHOG_DEFAULTS: ${VITE_PUBLIC_POSTHOG_DEFAULTS}

      # Billing (Stripe)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}

      # CRM Integrations
      HUBSPOT_CLIENT_ID: ${HUBSPOT_CLIENT_ID}
      HUBSPOT_CLIENT_SECRET: ${HUBSPOT_CLIENT_SECRET}
      HUBSPOT_REDIRECT_URI: ${HUBSPOT_REDIRECT_URI}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - intro-hub-network
    volumes:
      # Mount .env file if it exists
      - ./.env.local:/app/.env.local:ro

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  intro-hub-network:
    driver: bridge

